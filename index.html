<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Tischfinder</title>

  <link rel="icon" href="icon.png" />
  <link rel="apple-touch-icon" href="icon.png" />

  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Tischfinder" />

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .topbar {
      flex: 0 0 auto;
      background: #111;
      padding: 6px 10px;
      box-shadow: 0 3px 12px rgba(0,0,0,.45);
      z-index: 20;
    }

    .topline {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      white-space: nowrap;
      letter-spacing: .3px;
    }

    .search {
      display: flex;
      gap: 6px;
      flex: 1;
    }

    input {
      width: 100%;
      padding: 7px 10px;
      border-radius: 11px;
      border: none;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      outline: none;
    }

    button {
      border: none;
      border-radius: 11px;
      padding: 0 12px;
      background: #f5b21b;
      color: #111;
      font-weight: 800;
      font-size: 13px;
    }

    .status {
      margin-top: 4px;
      min-height: 16px;
      color: #f5b21b;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .plan-area {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      overflow: auto;
      background: #222;
      touch-action: pan-x pan-y pinch-zoom;
      -webkit-overflow-scrolling: touch;
    }

    .plan {
      position: relative;
      width: 100%;
      min-width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: pan-x pan-y pinch-zoom;
    }

    .plan-inner {
      position: relative;
      max-width: 100%;
      max-height: 100%;
      line-height: 0;
      touch-action: pan-x pan-y pinch-zoom;
    }

    .plan-inner img {
      display: block;
      width: auto;
      height: auto;
      max-width: 100vw;
      max-height: calc(100vh - 82px);
      border-radius: 10px;
      user-select: none;
      -webkit-user-drag: none;
      touch-action: pan-x pan-y pinch-zoom;
    }

    .marker {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #e11d48;
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      font-weight: 900;
      box-shadow: 0 0 0 12px rgba(225,29,72,.25), 0 10px 28px rgba(0,0,0,.55);
      animation: pulse .8s infinite alternate;
      z-index: 10;
      line-height: 1;
    }

    .tag {
      position: absolute;
      transform: translate(-50%, -150%);
      display: none;
      background: #9f1239;
      color: white;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      z-index: 11;
      line-height: 1;
    }

    @keyframes pulse {
      from { transform: translate(-50%, -50%) scale(1); }
      to { transform: translate(-50%, -50%) scale(1.12); }
    }

    @media (orientation: portrait) {
      .topline {
        align-items: stretch;
      }

      h1 {
        font-size: 16px;
      }

      input {
        font-size: 17px;
      }

      .plan-inner img {
        max-height: calc(100vh - 90px);
      }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="topline">
      <h1>📍 Tischfinder</h1>
      <div class="search">
        <input id="tableInput" type="tel" inputmode="numeric" placeholder="Tisch Nr." />
        <button onclick="resetSearch()">Reset</button>
      </div>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div class="plan-area" id="planArea">
    <div class="plan">
      <div class="plan-inner" id="planInner">
        <img src="plan.png" alt="Terrassenplan" />
        <div id="tag" class="tag">HIER</div>
        <div id="marker" class="marker"></div>
      </div>
    </div>
  </div>

<script>
const tables = {
  "311": {x:11.7,y:8.7}, "312": {x:7.8,y:20.9}, "310": {x:14.7,y:20.9},
  "309": {x:22.7,y:15.1}, "307": {x:31.1,y:8.7}, "308": {x:31.1,y:20.9},
  "305": {x:42.2,y:8.7}, "306": {x:42.2,y:20.9}, "303": {x:50.2,y:8.7},
  "304": {x:50.2,y:20.9}, "302": {x:62.3,y:15.1}, "301": {x:69.3,y:9.2},
  "300": {x:69.3,y:21.0},

  "209": {x:81.4,y:9.4}, "207": {x:78.4,y:21.3}, "208": {x:84.8,y:21.3},
  "206": {x:83.5,y:42.5}, "205": {x:76.8,y:49.5}, "203": {x:84.2,y:57.2},
  "204": {x:90.1,y:57.2}, "201": {x:76.9,y:69.8}, "202": {x:86.6,y:69.8},
  "200": {x:81.5,y:82.3},

  "409": {x:8.5,y:49.3}, "407": {x:16.1,y:42.3}, "408": {x:16.1,y:57.1},
  "405": {x:26.7,y:42.3}, "406": {x:26.7,y:57.1}, "403": {x:34.6,y:42.3},
  "404": {x:34.6,y:56.4}, "402": {x:51.8,y:48.0}, "401": {x:61.7,y:42.4},
  "400": {x:61.7,y:57.2},

  "107": {x:27.5,y:74.6}, "106": {x:35.2,y:74.6}, "105": {x:48.7,y:74.6},
  "104": {x:55.9,y:74.6}, "103": {x:27.5,y:89.1}, "102": {x:35.2,y:89.1},
  "101": {x:48.7,y:89.1}, "100": {x:55.9,y:89.1}
};

const input = document.getElementById("tableInput");
const marker = document.getElementById("marker");
const tag = document.getElementById("tag");
const status = document.getElementById("status");

input.addEventListener("input", () => {
  const value = input.value.replace(/[^0-9]/g, "");
  input.value = value;

  const table = tables[value];

  if (!value) {
    hideMarker();
    status.textContent = "";
    return;
  }

  if (!table) {
    hideMarker();
    status.textContent = "Diese Tischnummer ist nicht im Plan.";
    return;
  }

  marker.textContent = value;
  marker.style.left = table.x + "%";
  marker.style.top = table.y + "%";
  marker.style.display = "flex";

  tag.style.left = table.x + "%";
  tag.style.top = table.y + "%";
  tag.style.display = "block";

  status.textContent = "Tisch " + value + " ist markiert.";
});

function hideMarker() {
  marker.style.display = "none";
  tag.style.display = "none";
}

function resetSearch() {
  input.value = "";
  hideMarker();
  status.textContent = "";
  input.focus();
}
</script>

</body>
</html>
